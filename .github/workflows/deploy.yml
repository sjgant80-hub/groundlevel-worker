name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # only runs if CLOUDFLARE_API_TOKEN secret is set in repo
    # to enable: Settings → Secrets → Actions → New repository secret
    #   name:  CLOUDFLARE_API_TOKEN  (Workers Edit permission)
    #   name:  CLOUDFLARE_ACCOUNT_ID (your account id)
    # without these secrets, this job will fail at the deploy step — that's fine if you deploy manually.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
